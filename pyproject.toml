[project]
name = "modelica-testing"
version = "0.1.0"
description = "Regression testing system for Modelica libraries using Dymola"
requires-python = ">=3.10"
dependencies = [
    "jinja2>=3.1",
    "matplotlib>=3.8",
    "numpy>=1.20",
    "psutil>=5.9",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[project.scripts]
modelica-testing = "modelica_testing.cli:main_entry"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/modelica_testing"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "dymola: requires Dymola installation",
]
filterwarnings = [
    "ignore::pytest.PytestCollectionWarning",
]
